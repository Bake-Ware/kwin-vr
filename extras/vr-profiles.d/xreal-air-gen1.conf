# Xreal Air Gen 1 — SBS glasses via DP-Alt over USB-C
#
# Two sets of keys in this file:
#   VR_*          — read by the kwin-vr plugin (output matching, QML config)
#   VR_EDID_VENDOR, VR_HID_*, VR_DESKTOP_*, VR_DP_* — read by kwin-vr-custodian

# ── Identity ──────────────────────────────────────────────────────────────────
VR_NAME="Xreal Air Gen 1"
VR_DETECT_TYPE="display"

# ── EDID matching ─────────────────────────────────────────────────────────────
VR_EDID_NAME="Air"
VR_EDID_VENDOR="MRG"

# ── SBS trigger ───────────────────────────────────────────────────────────────
# Pressing the glasses button sends an HPD; the EDID changes to advertise
# 3840x1080 when in SBS mode and 1920x1080 when in desktop mode.
VR_SBS_WIDTH=3840
VR_SBS_HEIGHT=1080
VR_DESKTOP_WIDTH=1920
VR_DESKTOP_HEIGHT=1080

# ── USB HID init ──────────────────────────────────────────────────────────────
# Protocol: W_DISP_MODE command (msgid 0x0008), interface 4.
# Packet is 64 bytes: header 0xFD, CRC32 at bytes 1-4, length at 5-6,
# msgid at 15-16, mode byte at 22.
# Generated by build_mode_packet() in xreal-sbs-switch.py.
VR_DETECT_USB="3318:0424"
VR_HID_VENDOR="3318"
VR_HID_PRODUCT="0424"
VR_HID_INTERFACE=4
VR_HID_PAYLOAD_2D=fd:f5:d3:8e:e8:12:00:00:00:00:00:00:00:00:00:08:00:00:00:00:00:00:01:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00
VR_HID_PAYLOAD_3D=fd:d9:b2:80:06:12:00:00:00:00:00:00:00:00:00:08:00:00:00:00:00:00:03:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00:00

# ── OpenXR runtime ────────────────────────────────────────────────────────────
VR_OPENXR_RUNTIME="monado"

# ── Display parameters ────────────────────────────────────────────────────────
VR_WIDTH=3840
VR_HEIGHT=1080
VR_REFRESH=60
VR_SCALE=1
VR_VIRTUAL_WIDTH=1920
VR_VIRTUAL_HEIGHT=1080

# ── DP link training ──────────────────────────────────────────────────────────
VR_DP_FORCE_RETRAIN=true
